name: Downgrade
on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
jobs:
  test:
    # Runs strict (allow_reresolve=false); expected RED until StatsBase resolves (#1326).
    name: Downgrade
    strategy:
      matrix:
        julia-version: ['1.10']
        group: ['Core1']
    uses: "SciML/.github/.github/workflows/downgrade.yml@v1"
    with:
      julia-version: "${{ matrix.julia-version }}"
      group: "${{ matrix.group }}"
      skip: "Pkg,TOML"
    secrets: "inherit"
